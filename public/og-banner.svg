<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Corner decorations -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="40" x2="40"  y2="100" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="1160" y1="40"  x2="1100" y2="40"  stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="1160" y1="40"  x2="1160" y2="100" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="40"   y1="590" x2="100"  y2="590" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="40"   y1="590" x2="40"   y2="530" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="1160" y1="590" x2="1100" y2="590" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="1160" y1="590" x2="1160" y2="530" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

  <!-- Hexagon icon -->
  <g transform="translate(180, 315)">
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55"
      fill="none" stroke="#ffffff" stroke-width="3"/>
    <polygon points="0,-82 71,-41 71,41 0,82 -71,41 -71,-41"
      fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
    <text x="0" y="30" text-anchor="middle"
      style="font-family:monospace;font-size:100px;font-weight:700;fill:#ffffff;">Q</text>
    <line x1="28" y1="38" x2="52" y2="68" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0"   cy="-110" r="5" fill="#ffffff"/>
    <circle cx="95"  cy="-55"  r="5" fill="#ffffff"/>
    <circle cx="95"  cy="55"   r="5" fill="#ffffff"/>
    <circle cx="0"   cy="110"  r="5" fill="#ffffff"/>
    <circle cx="-95" cy="55"   r="5" fill="#ffffff"/>
    <circle cx="-95" cy="-55"  r="5" fill="#ffffff"/>
    <polygon points="72,−88 76,−76 88,−76 78,−68 82,−56 72,−64 62,−56 66,−68 56,−76 68,−76"
      fill="#ffffff"/>
  </g>

  <!-- Title -->
  <text x="340" y="270"
    style="font-family:monospace;font-size:96px;font-weight:700;fill:#ffffff;letter-spacing:-2px;">STACKS</text>
  <text x="340" y="380"
    style="font-family:monospace;font-size:96px;font-weight:700;fill:#ffffff;letter-spacing:-2px;">QUEST</text>

  <!-- Divider -->
  <line x1="340" y1="405" x2="1100" y2="405" stroke="#ffffff" stroke-width="1"/>

  <!-- Tagline -->
  <text x="340" y="445"
    style="font-family:monospace;font-size:22px;font-weight:400;fill:#ffffff;opacity:0.6;letter-spacing:6px;">DAILY ON-CHAIN PUZZLE GAME</text>

  <!-- Tags -->
  <rect x="340" y="480" width="130" height="32" rx="4" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <text x="405" y="501" text-anchor="middle"
    style="font-family:monospace;font-size:13px;fill:#ffffff;letter-spacing:2px;">$B2S TOKEN</text>

  <rect x="484" y="480" width="130" height="32" rx="4" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <text x="549" y="501" text-anchor="middle"
    style="font-family:monospace;font-size:13px;fill:#ffffff;letter-spacing:2px;">NFT BADGES</text>

  <rect x="628" y="480" width="130" height="32" rx="4" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <text x="693" y="501" text-anchor="middle"
    style="font-family:monospace;font-size:13px;fill:#ffffff;letter-spacing:2px;">FARCASTER</text>

  <rect x="772" y="480" width="130" height="32" rx="4" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <text x="837" y="501" text-anchor="middle"
    style="font-family:monospace;font-size:13px;fill:#ffffff;letter-spacing:2px;">STACKS L2</text>

  <!-- URL -->
  <circle cx="340" cy="560" r="5" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <circle cx="340" cy="560" r="2.5" fill="#ffffff" opacity="0.5"/>
  <text x="356" y="565"
    style="font-family:monospace;font-size:16px;fill:#ffffff;opacity:0.4;letter-spacing:1px;">stacks-quest.vercel.app</text>
</svg>