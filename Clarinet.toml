[project]
name = 'stacks-quest'
description = 'Daily on-chain puzzle game on Stacks'
authors = ['wkalidev <wkalidev@base2stacks.io>']
telemetry = false
cache_dir = '.\.cache'

# External requirements (mainnet contracts)
[[project.requirements]]
contract_id = 'SP120SBRBQJ00MCWS7TM5R8WJNTTKD5K0HFRC2CNE.usdcx'

[[project.requirements]]
contract_id = 'SM3VDXK3WZZSA84XXFKAFAF15NNZX32CTSG82JFQ4.sbtc-token'

# b2s-token-v4 stub local - Clarity 2 / epoch 2.5 (utilise block-height)
[contracts.b2s-token-v4]
path = 'contracts/b2s-token-v4.clar'
clarity_version = 2
epoch = '2.5'

# Contrat de jeu principal - Clarity 3 / epoch 3.2
[contracts.stacks-quest-v2]
path = 'contracts/stacks-quest-v2.clar'
clarity_version = 3
epoch = '3.2'

[repl.analysis]
passes = []

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'

# stacks-quest-agent-v2 removed from the active project during the 2026-07-16 audit —
# superseded by v3 below, never deployed as the active check-in contract (see
# contracts/stacks-quest-agent-v2.clar for the deprecation note).

# Agent non-custodial - Clarity 3 / epoch 3.2
[contracts.stacks-quest-agent-v3]
path = 'contracts/stacks-quest-agent-v3.clar'
clarity_version = 3
epoch = '3.2'

# DRAFT (source file) — pas encore déployé. Enregistré ici sous son nom de
# déploiement CIBLE ("stacks-quest-v3", sans "-draft") pour que clarinet
# check / les tests valident exactement les références inter-contrats
# (.b2s-token-v5) qui seront utilisées une fois déployé pour de vrai.
# Fixe la faille CRITIQUE "réponse du puzzle publique on-chain" (voir SECURITY.md).
[contracts.stacks-quest-v3]
path = 'contracts/stacks-quest-v3-draft.clar'
clarity_version = 3
epoch = '3.2'

# DRAFT (source file) — pas encore déployé. Enregistré sous son nom de
# déploiement CIBLE ("b2s-token-v5", sans "-draft") — voir note ci-dessus.
# Fixe la faille CRITIQUE "faucet B2S illimité" (voir SECURITY.md).
[contracts.b2s-token-v5]
path = 'contracts/b2s-token-v5-draft.clar'
clarity_version = 2
epoch = '2.5'